<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Directory</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">

            <!-- header -->
            <div class="header">
                <div class="header-left">
                    <div class="icon">
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <h1>Report Directory</h1>
                </div>
                <div class="header-right">
                    <span class="badge">
                        <i class="fas fa-file-alt"></i>
                        <div class="file_count">-</div> reports
                    </span>
                </div>
            </div>

            <!-- report grid -->
            <div class="report-grid">
                <div class="inserter">$INSERTER$</div>
            </div>

            <div
                style="margin-top: 24px; text-align: center; font-size: 13px; color: #9aabbc; border-top: 1px solid #f0f4f9; padding-top: 18px;">
                <i class="fas fa-code" style="margin-right: 6px;"></i>
                Click any report card to open it.
            </div>
        </div>
    </div>
</body>
<script>
    let file_count = document.body.querySelector(".file_count");
    let reports = document.body.querySelector(".report-grid");
    window.onload = e => {
        file_count.innerHTML = reports.childElementCount - 1;
    };
</script>

</html>
